<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… | Dawson Metzger-Fleetwood</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.0.9/css/boxicons.min.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../mobile-styles.css">
  <link rel="stylesheet" href="blog-styles.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="../blog-data.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        darkMode: true,
        background: '#2c2c2c',
        primaryColor: '#2c2c2c',
        primaryTextColor: '#e6f1ff',
        primaryBorderColor: '#a2a2a3',
        lineColor: '#a2a2a3',
        nodeTextColor: '#e6f1ff',
        mainBkg: '#2c2c2c',
        nodeBorder: '#a2a2a3',
        edgeLabelBackground: '#2c2c2c',
      },
      flowchart: { curve: 'basis', padding: 16 },
    });
  </script>
</head>

<body>
  <div id="main-body">
    <div id="cursor-container">
      <div class="cursor-follow"></div>
      <div class="circle-follow"></div>
    </div>

    <nav class="blog-nav">
      <a class="name-logo name-logo-visible" href="../index.html">D</a>
    </nav>

    <article class="blog-post-container">
      <header class="blog-post-header">
        <h1 class="blog-post-title" id="post-title"></h1>
        <div class="blog-post-meta" id="post-meta"></div>
      </header>
      <div class="blog-post-content" id="post-content"></div>
    </article>

    <footer class="footer-container blog-footer">
      <span class="footer-spacer"></span>
      <p class="footer-text">
        Designed and built by Dawson Metzger-Fleetwood
      </p>
      <span class="footer-spacer"></span>
    </footer>
  </div>

  <script>
    (function () {
      const cursor = document.querySelector('.cursor-follow');
      const circle = document.querySelector('.circle-follow');
      if (!cursor || !circle) return;

      let mouseX = 0, mouseY = 0;
      let circleX = 0, circleY = 0;
      let cursorX = 0, cursorY = 0;

      document.addEventListener('mousemove', function (e) {
        const body = document.body.getBoundingClientRect();
        const mainBody = document.getElementById('main-body');
        let adjustment = 8;
        if (mainBody) {
          const diff = (body.width - mainBody.getBoundingClientRect().width) / 2;
          adjustment = diff <= 0 ? 8 : 8 - diff;
        }
        mouseX = e.clientX - body.left - window.scrollX + adjustment;
        mouseY = e.clientY - body.top  - window.scrollY + 8;
      });

      (function animate() {
        circleX += (mouseX - circleX - circle.offsetWidth  / 2) * 0.25;
        circleY += (mouseY - circleY - circle.offsetHeight / 2) * 0.25;
        cursorX += (mouseX - cursorX - cursor.offsetWidth  / 2) * 0.6;
        cursorY += (mouseY - cursorY - cursor.offsetHeight / 2) * 0.6;
        cursor.style.left = cursorX + 'px';
        cursor.style.top  = cursorY + 'px';
        circle.style.left = circleX + 'px';
        circle.style.top  = circleY + 'px';
        requestAnimationFrame(animate);
      })();

      const hoverSelectors = '.text-link, .name-logo, .blog-back-link, .button-link, .socials-item, .menu-item';
      document.addEventListener('mouseover', e => {
        if (e.target.closest(hoverSelectors)) cursor.classList.add('cursor-follow-clickable');
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest(hoverSelectors)) cursor.classList.remove('cursor-follow-clickable');
      });

      document.addEventListener('mousemove', function () {
        const container = document.getElementById('cursor-container');
        if (container) container.style.opacity = '1';
      }, { once: true });
    })();
  </script>

  <script>
    (function () {
      marked.use({
        gfm: true,
        breaks: false,
        renderer: {
          link({ href, title, tokens }) {
            const text = this.parser.parseInline(tokens);
            const titleAttr = title ? ` title="${title}"` : '';
            if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
              return `<a href="${href}" class="text-link" target="_blank" rel="noopener noreferrer"${titleAttr}>${text}</a>`;
            }
            return `<a href="${href}" class="text-link"${titleAttr}>${text}</a>`;
          },
          image({ href, title, text }) {
            const titleAttr = title ? ` title="${title}"` : '';
            return `<img src="${href}" alt="${text}" class="blog-image"${titleAttr}>`;
          },
          code({ text, lang }) {
            if (lang === 'mermaid') {
              return `<div class="mermaid">${text}</div>`;
            }
            if (lang && hljs.getLanguage(lang)) {
              return `<pre><code class="hljs language-${lang}">${hljs.highlight(text, { language: lang }).value}</code></pre>`;
            }
            return `<pre><code class="hljs">${hljs.highlightAuto(text).value}</code></pre>`;
          },
        },
      });

      function parseFrontmatter(raw) {
        const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
        if (!match) return { meta: {}, body: raw };

        const meta = {};
        match[1].split('\n').forEach(line => {
          const idx = line.indexOf(':');
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          let val = line.slice(idx + 1).trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
          }
          meta[key] = val;
        });
        return { meta, body: match[2] };
      }

      function loadPostScripts(scripts) {
        if (!scripts || !scripts.length) return Promise.resolve();
        return scripts.reduce((chain, src) => {
          return chain.then(() => new Promise((resolve, reject) => {
            const el = document.createElement('script');
            el.src = src;
            el.onload = resolve;
            el.onerror = reject;
            document.body.appendChild(el);
          }));
        }, Promise.resolve());
      }

      function loadPostStyles(styles) {
        if (!styles || !styles.length) return;
        styles.forEach(href => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        });
      }

      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');

      if (!postId) {
        document.getElementById('post-title').textContent = 'Post not found';
        return;
      }

      fetch(`posts/${postId}.md`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(raw => {
          const { meta, body } = parseFrontmatter(raw);

          document.title = (meta.title || 'Blog') + ' | Dawson Metzger-Fleetwood';
          document.getElementById('post-title').textContent = meta.title || '';

          const metaEl = document.getElementById('post-meta');
          const pills = [];
          if (meta.date) pills.push(meta.date);

          const postData = (window.BLOG_POSTS || []).find(p => p.id === postId);
          if (postData && postData.tags) {
            postData.tags.forEach(t => pills.push(t));
          }

          pills.push('<span id="read-time"></span>');
          metaEl.innerHTML = pills.map(p =>
            p.startsWith('<') ? `<span class="pill">${p}</span>` : `<span class="pill">${p}</span>`
          ).join('');

          loadPostStyles(Array.isArray(meta.styles) ? meta.styles : meta.styles ? [meta.styles] : []);

          const contentEl = document.getElementById('post-content');
          contentEl.innerHTML = marked.parse(body);
          mermaid.run({ nodes: contentEl.querySelectorAll('.mermaid') });

          const words = contentEl.innerText.trim().split(/\s+/).length;
          const minutes = Math.max(1, Math.round(words / 200));
          const readTimeEl = document.getElementById('read-time');
          if (readTimeEl) readTimeEl.textContent = minutes + ' min read';

          const scriptsList = Array.isArray(meta.scripts) ? meta.scripts : meta.scripts ? [meta.scripts] : [];
          return loadPostScripts(scriptsList);
        })
        .catch(() => {
          document.getElementById('post-title').textContent = 'Post not found';
          document.getElementById('post-content').innerHTML = '<p>Sorry, this post could not be loaded.</p>';
        });
    })();
  </script>
</body>
</html>
