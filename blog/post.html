<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="32x32" href="../resources/favicon-32.png">
  <link rel="apple-touch-icon" href="../resources/apple-touch-icon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.0.9/css/boxicons.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/mobile-styles.css">
  <link rel="stylesheet" href="blog-styles.css">
  <link rel="stylesheet" href="../css/theme-cycler.css">
  <script src="../js/theme-bootstrap.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <script src="../js/blog-data.js"></script>
  <script src="../js/nav-config.js" defer></script>
  <script src="../js/cursor-follow.js" defer></script>
  <script>
    // Mermaid colors come from the CSS variables (set inline pre-paint by
    // theme-bootstrap.js), with the default palette as fallback. Diagrams
    // render once, so a live theme switch shows on the next load.
    (function () {
      var css = getComputedStyle(document.documentElement);
      function v(name, fallback) {
        var val = (css.getPropertyValue(name) || '').trim();
        return val || fallback;
      }
      var bgc  = v('--secondary', '#2c2c2c');
      var txt  = v('--text', '#e6f1ff');
      var line = v('--neutral-gray', '#a2a2a3');
      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        themeVariables: {
          darkMode: true,
          background: bgc,
          primaryColor: bgc,
          primaryTextColor: txt,
          primaryBorderColor: line,
          lineColor: line,
          nodeTextColor: txt,
          mainBkg: bgc,
          nodeBorder: line,
          edgeLabelBackground: bgc,
        },
        flowchart: { curve: 'basis', padding: 16 },
      });
    })();
  </script>
</head>

<body>
  <div id="main-body" class="blog-post-page">
    <div id="cursor-container">
      <div class="cursor-follow"></div>
      <div class="circle-follow"></div>
    </div>

    <!-- Full site nav, rendered config-driven by ../js/nav-config.js (which also
         appends the Theme dropdown trigger). Mirrors blog/index.html so post
         pages match the rest of the site. The static menus default to opacity:0
         and are normally faded in by the home/listing intro animation, which
         post pages don't run, so blog-styles.css reveals them via .blog-post-page. -->
    <nav class="moving-menu" aria-label="Main navigation">
      <ul class="menu-list"></ul>
    </nav>

    <div class="header-menu-container">
      <a class="name-logo name-logo-visible" href="../index.html">D</a>
      <nav class="static-menu" aria-label="Main navigation">
        <ul class="menu-list"></ul>
      </nav>
      <nav class="static-menu-mobile" aria-label="Quick links">
        <ul class="menu-list"></ul>
      </nav>
    </div>

    <article class="blog-post-container">
      <header class="blog-post-header">
        <h1 class="blog-post-title" id="post-title"></h1>
        <div class="blog-post-meta" id="post-meta"></div>
      </header>
      <div class="blog-post-content" id="post-content"></div>
    </article>

    <footer class="footer-container blog-footer">
      <span class="footer-spacer"></span>
      <p class="footer-text">
        Designed and built by Dawson Metzger-Fleetwood
      </p>
      <span class="footer-spacer"></span>
    </footer>
  </div>

  <script src="blog-post.js"></script>
  <script defer src="../js/theme-cycler.js"></script>
</body>
</html>
